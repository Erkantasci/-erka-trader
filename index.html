<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erka Trader Pro • Professional</title>
    <style>
        body { 
            background: linear-gradient(135deg, #0a0a0a, #111827); 
            color: #00ff9f; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
        }
        .container { max-width: 1100px; margin: 0 auto; }
        h1 { text-align: center; color: #00ff9f; text-shadow: 0 0 15px #00ff9f; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .balance { background: #1f2937; padding: 15px 25px; border-radius: 12px; font-size: 22px; }
        button { 
            padding: 14px 28px; 
            font-size: 17px; 
            background: linear-gradient(#00ff9f, #00cc7a); 
            color: #000; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            margin: 8px; 
        }
        .card { 
            background: #1f2937; 
            padding: 25px; 
            border-radius: 16px; 
            margin: 15px 0; 
            box-shadow: 0 10px 30px rgba(0, 255, 159, 0.1); 
        }
        input { 
            padding: 14px; 
            font-size: 17px; 
            width: 260px; 
            border-radius: 10px; 
            border: 2px solid #00ff9f; 
            background: #111827; 
            color: #00ff9f; 
            margin: 10px; 
        }
        .result { 
            background: #111827; 
            padding: 20px; 
            border-radius: 12px; 
            margin-top: 20px; 
            max-height: 500px; 
            overflow-y: auto; 
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #374151; }
        .green { color: #00ff9f; }
        .red { color: #ff5555; }
    </style>
</head>

        <h1>🚀 Erka Trader Pro</h1>

            <input type="password" id="pass" placeholder="Şifrenizi girin">
            <button onclick="login()">Giriş</button>
        </div>

        <div id="dashboard" style="display:none;">
            <div class="header">
                <div>
                    <h2>Hoş geldin Erkan</h2>
                </div>
                <div class="balance">

                </div>
            </div>

            <div class="card">
                <button onclick="getPrice('BTCUSDT')">BTC Fiyatı</button>
                <button onclick="showMarket()">Piyasa</button>
                <button onclick="showPortfolio()">Portföyüm</button>
                <button onclick="simulateTrade()">Al-Sat Yap</button>
            </div>

            <div id="result" class="result"></div>
        </div>
    </div>

                document.getElementById('login').style.display = 'none';
                document.getElementById('dashboard').style.display = 'block';
                updateBalance();
            } else {
                alert("Yanlış şifre!");
            }
