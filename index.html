<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erka Trader Pro • Auto Bot</title>
    <style>
        body { background: #0f172a; color: #e0f2fe; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
        .header { background: #1e2937; padding: 20px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 26px; font-weight: bold; color: #22c55e; }
        .balance-box { background: #334155; padding: 12px 25px; border-radius: 12px; font-size: 20px; }
        .auto-bot { background: #1e40af; color: white; padding: 15px; border-radius: 12px; margin: 20px 0; }
        button { padding: 14px 28px; font-size: 17px; background: #22c55e; color: #0f172a; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin: 8px 5px; }
        input, select { padding: 14px; font-size: 17px; border-radius: 10px; border: 2px solid #475569; background: #0f172a; color: #e0f2fe; margin: 8px; }
        .password-wrapper { position: relative; display: inline-block; }
        .toggle-eye { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 22px; color: #64748b; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #475569; }
        th { background: #334155; }
        .green { color: #22c55e; font-weight: bold; }
        .red { color: #ef4444; font-weight: bold; }
        .result-box { background: #0f172a; padding: 20px; border-radius: 12px; margin-top: 20px; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">🚀 Erka Trader Pro • Auto Bot</div>
    <div class="balance-box">
        Bakiye: <span id="balance">1000.00</span> USDT
    </div>
</div>

<div class="container">

    <!-- GİRİŞ -->
    <div id="loginSection" class="section">
        <h2>Giriş Yap</h2>
        <div class="password-wrapper">
            <input type="password" id="passwordInput" placeholder="Şifrenizi girin" onkeypress="if(event.key === 'Enter') login()">
            <span class="toggle-eye" onclick="togglePassword()">👁️</span>
        </div>
        <br>
        <button onclick="login()">Giriş Yap</button>
    </div>

    <!-- ANA PANEL -->
    <div id="dashboard" style="display:none;">

        <!-- AUTO BOT -->
        <div class="auto-bot">
            <h3>🤖 Auto Bot (Para Kazanma Modu)</h3>
            <button onclick="toggleAutoBot()">Botu Başlat / Durdur</button>
            <span id="botStatus" style="margin-left:20px; font-weight:bold;">DURDU</span>
            <div id="botLog" style="margin-top:15px; font-size:15px; max-height:150px; overflow-y:auto;"></div>
            <div id="profitSummary" style="margin-top:10px; font-size:18px; color:#22c55e;"></div>
        </div>

        <div style="margin-bottom:20px;">
            <button onclick="showSection('market')">Piyasa</button>
            <button onclick="showSection('portfolio')">Portföy</button>
            <button onclick="showSection('trade')">Manuel Al-Sat</button>
            <button onclick="showSection('history')">Geçmiş</button>
        </div>

        <div id="market" class="section">
            <h2>Piyasa Verileri</h2>
            <button onclick="loadMarketData()">Piyasayı Güncelle</button>
            <div id="marketResult" class="result-box"></div>
        </div>

        <div id="portfolio" class="section" style="display:none;">
            <h2>Portföyüm</h2>
            <div id="portfolioResult" class="result-box"></div>
        </div>

        <div id="trade" class="section" style="display:none;">
            <h2>Manuel Al-Sat</h2>
            <input type="text" id="tradeSymbol" placeholder="Coin (BTCUSDT)">
            <input type="number" id="tradeAmount" placeholder="Miktar (USDT)">
            <select id="tradeType" style="padding:14px; font-size:17px; border-radius:10px; background:#0f172a; color:#e0f2fe; border:2px solid #475569;">
                <option value="buy">AL</option>
                <option value="sell">SAT</option>
            </select>
            <button onclick="executeTrade()">İşlemi Gerçekleştir</button>
            <div id="tradeResult" class="result-box"></div>
        </div>

        <div id="history" class="section" style="display:none;">
            <h2>Emir Geçmişi</h2>
            <div id="historyResult" class="result-box"></div>
        </div>

    </div>
</div>

<script>
// ==================== DEĞİŞKENLER ====================
let userBalance = 1000;
let positions = {};
let tradeHistory = [];
let autoBotRunning = false;
let botInterval = null;
let totalProfit = 0;
let winTrades = 0;
let totalTrades = 0;

// ==================== ŞİFRE ====================
function togglePassword() {
    const input = document.getElementById('passwordInput');
    input.type = input.type === "password" ? "text" : "password";
}

function login() {
    const pass = document.getElementById('passwordInput').value;
    if (pass === "Serkan.456154") {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        updateBalance();
        loadMarketData();
    } else {
        alert("Şifre yanlış!");
    }
}

document.getElementById('passwordInput').addEventListener('keypress', function(e) {
    if (e.key === "Enter") login();
});

// ==================== BAKİYE ====================
function updateBalance() {
    document.getElementById('balance').innerText = userBalance.toFixed(2);
}

// ==================== PİYASA ====================
async function loadMarketData() {
    const container = document.getElementById('marketResult');
    container.innerHTML = "Yükleniyor...";

    try {
        const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
        const data = await res.json();

        let html = `<table><tr><th>Coin</th><th>Fiyat</th><th>24s Değişim</th></tr>`;
        
        data.sort((a, b) => parseFloat(b.priceChangePercent) - parseFloat(a.priceChangePercent))
            .slice(0, 40)
            .forEach(coin => {
                const change = parseFloat(coin.priceChangePercent);
                const colorClass = change >= 0 ? 'green' : 'red';
                html += `<tr>
                    <td><strong>${coin.symbol}</strong></td>
                    <td>$${parseFloat(coin.lastPrice).toLocaleString()}</td>
                    <td class="${colorClass}">${change.toFixed(2)}%</td>
                </tr>`;
            });
        html += `</table>`;
        container.innerHTML = html;
    } catch (e) {
        container.innerHTML = "Veri alınamadı.";
    }
}

// ==================== PORTFÖY ====================
function showPortfolio() {
    const container = document.getElementById('portfolioResult');
    let html = `<h3>Açık Pozisyonlar</h3>`;
    
    if (Object.keys(positions).length === 0) {
        html += `<p>Henüz pozisyonunuz yok.</p>`;
    } else {
        html += `<table><tr><th>Coin</th><th>Miktar</th><th>Ortalama Fiyat</th><th>Toplam Değer</th></tr>`;
        for (let symbol in positions) {
            const pos = positions[symbol];
            html += `<tr>
                <td>${symbol}</td>
                <td>${pos.amount.toFixed(6)}</td>
                <td>$${pos.avgPrice.toFixed(2)}</td>
                <td>$${(pos.amount * pos.avgPrice).toFixed(2)}</td>
            </tr>`;
        }
        html += `</table>`;
    }
    container.innerHTML = html;
}

// ==================== MANUEL AL-SAT ====================
async function executeTrade() {
    const symbol = document.getElementById('tradeSymbol').value.toUpperCase();
    const amount = parseFloat(document.getElementById('tradeAmount').value);
    const type = document.getElementById('tradeType').value;
    const resultBox = document.getElementById('tradeResult');

    if (!symbol || !amount || amount <= 0) {
        resultBox.innerHTML = `<p style="color:#ef4444">Lütfen geçerli değer girin.</p>`;
        return;
    }

    try {
        const res = await fetch(`https://api.binance.com/api/v3/ticker/price?symbol=${symbol}`);
        const data = await res.json();
        const price = parseFloat(data.price);

        if (type === "buy") {
            if (userBalance < amount) {
                resultBox.innerHTML = `<p style="color:#ef4444">Yetersiz bakiye!</p>`;
                return;
            }
            const coinAmount = amount / price;
            userBalance -= amount;

            if (!positions[symbol]) positions[symbol] = { amount: 0, avgPrice: 0 };
            const oldAmount = positions[symbol].amount;
            positions[symbol].avgPrice = ((positions[symbol].avgPrice * oldAmount) + (price * coinAmount)) / (oldAmount + coinAmount);
            positions[symbol].amount += coinAmount;

            tradeHistory.unshift({ time: new Date().toLocaleTimeString(), type: "ALIM", symbol, amount: coinAmount, price, total: amount });
            resultBox.innerHTML = `<p style="color:#22c55e"><strong>ALIM BAŞARILI</strong></p>`;
        } 
        else if (type === "sell") {
            if (!positions[symbol] || positions[symbol].amount < (amount / price)) {
                resultBox.innerHTML = `<p style="color:#ef4444">Yeterli coin yok!</p>`;
                return;
            }
            const sellAmount = amount / price;
            positions[symbol].amount -= sellAmount;
            userBalance += amount;
            if (positions[symbol].amount <= 0) delete positions[symbol];

            tradeHistory.unshift({ time: new Date().toLocaleTimeString(), type: "SATIM", symbol, amount: sellAmount, price, total: amount });
            resultBox.innerHTML = `<p style="color:#22c55e"><strong>SATIM BAŞARILI</strong></p>`;
        }
        updateBalance();
        showPortfolio();
    } catch (e) {
        resultBox.innerHTML = `<p style="color:#ef4444">Hata oluştu.</p>`;
    }
}

// ==================== EMİR GEÇMİŞİ ====================
function showHistory() {
    const container = document.getElementById('historyResult');
    if (tradeHistory.length === 0) {
        container.innerHTML = `<p>Henüz işlem yok.</p>`;
        return;
    }
    let html = `<table><tr><th>Zaman</th><th>İşlem</th><th>Coin</th><th>Miktar</th><th>Fiyat</th></tr>`;
    tradeHistory.forEach(trade => {
        const color = trade.type === "ALIM" ? "green" : "red";
        html += `<tr>
            <td>${trade.time}</td>
            <td class="${color}"><strong>${trade.type}</strong></td>
            <td>${trade.symbol}</td>
            <td>${trade.amount.toFixed(6)}</td>
            <td>$${trade.price}</td>
        </tr>`;
    });
    html += `</table>`;
    container.innerHTML = html;
}

// ==================== OTOMATİK BOT (PARA KAZANMAYA ODAKLI) ====================
function toggleAutoBot() {
    const status = document.getElementById('botStatus');
    const log = document.getElementById('botLog');

    if (!autoBotRunning) {
        autoBotRunning = true;
        status.innerHTML = "ÇALIŞIYOR";
        status.style.color = "#22c55e";
        log.innerHTML = "Bot başlatıldı. Para kazanmaya odaklandı...<br>";

        botInterval = setInterval(async () => {
            if (!autoBotRunning) return;

            try {
                const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
                const data = await res.json();

                for (let coin of data) {
                    const symbol = coin.symbol;
                    const price = parseFloat(coin.lastPrice);
                    const change = parseFloat(coin.priceChangePercent);

                    // PARA KAZANMA STRATEJİSİ
                    if (change < -2 && !positions[symbol]) {
                        const buyAmount = Math.min(50, userBalance * 0.15);
                        if (userBalance >= buyAmount) {
                            const coinAmount = buyAmount / price;
                            userBalance -= buyAmount;
                            positions[symbol] = { amount: coinAmount, avgPrice: price };
                            tradeHistory.unshift({ time: new Date().toLocaleTimeString(), type: "BOT ALIM", symbol, amount: coinAmount, price, total: buyAmount });
                            log.innerHTML += `BOT: ${symbol} alındı (${change.toFixed(1)}% düşüş)<br>`;
                        }
                    }

                    if (positions[symbol]) {
                        const pos = positions[symbol];
                        const currentProfit = ((price - pos.avgPrice) / pos.avgPrice) * 100;

                        if (currentProfit > 3) {
                            const sellAmount = pos.amount * price;
                            userBalance += sellAmount;
                            delete positions[symbol];
                            tradeHistory.unshift({ time: new Date().toLocaleTimeString(), type: "BOT SATIM", symbol, amount: pos.amount, price, total: sellAmount });
                            log.innerHTML += `BOT: ${symbol} satıldı (+${currentProfit.toFixed(1)}% kar)<br>`;
                            totalProfit += (currentProfit * pos.amount * pos.avgPrice / 100);
                            winTrades++;
                        }
                    }
                }

                updateBalance();
                showPortfolio();

                document.getElementById('profitSummary').innerHTML = `Toplam Kar: $${totalProfit.toFixed(2)} | Win Rate: ${(winTrades / Math.max(totalTrades,1) * 100).toFixed(1)}%`;

            } catch (e) {
                log.innerHTML += "Bot hatası...<br>";
            }
        }, 30000);

    } else {
        autoBotRunning = false;
        clearInterval(botInterval);
        status.innerHTML = "DURDU";
        status.style.color = "#ef4444";
        log.innerHTML += "Bot durduruldu.<br>";
    }
}

// ==================== SEKSİYON DEĞİŞTİR ====================
function showSection(section) {
    document.getElementById('market').style.display = 'none';
    document.getElementById('portfolio').style.display = 'none';
    document.getElementById('trade').style.display = 'none';
    document.getElementById('history').style.display = 'none';

    document.getElementById(section).style.display = 'block';

    if (section === 'portfolio') showPortfolio();
    if (section === 'history') showHistory();
}

window.onload = function() {
    console.log("Erka Trader Pro - Auto Bot yüklendi.");
};
</script>

</body>
</html>
