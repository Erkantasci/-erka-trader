<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erka Trader Pro</title>
    <style>
        body { background: #0f172a; color: #e0f2fe; font-family: Arial; padding: 40px; text-align: center; }
        input { padding: 15px; font-size: 18px; width: 280px; border-radius: 10px; border: 2px solid #475569; background: #0f172a; color: #e0f2fe; }
        button { padding: 15px 40px; font-size: 18px; background: #22c55e; color: #0f172a; border: none; border-radius: 10px; margin: 20px 10px; cursor: pointer; }
        .eye { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); cursor: pointer; font-size: 22px; }
        .password-wrapper { position: relative; display: inline-block; }
    </style>
</head>
<body>
    <h1>🚀 Erka Trader Pro</h1>
    
    <div id="login">
        <h2>Giriş Yap</h2>
        <div class="password-wrapper">
            <input type="password" id="passwordInput" placeholder="Şifre girin" onkeypress="if(event.key === 'Enter') login()">
            <span class="eye" onclick="togglePassword()">👁️</span>
        </div>
        <br><br>
        <button onclick="login()">Giriş Yap</button>
    </div>

    <div id="main" style="display:none;">
        <h2>Hoş geldin Erkan</h2>
        <button onclick="getBTC()">BTC Fiyatı</button>
        <button onclick="getMarket()">Piyasa Özeti</button>
        <div id="result" style="margin-top:30px; background:#1e2937; padding:20px; border-radius:12px; min-height:100px;"></div>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('passwordInput');
            input.type = input.type === "password" ? "text" : "password";
        }

        function login() {
            const pass = document.getElementById('passwordInput').value;
            if (pass === "Serkan.456154") {
                document.getElementById('login').style.display = 'none';
                document.getElementById('main').style.display = 'block';
                getMarket();
            } else {
                alert("Yanlış şifre!");
            }
        }

        async function getBTC() {
            const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
            const data = await res.json();
            document.getElementById('result').innerHTML = 'BTC: $' + parseFloat(data.price).toLocaleString();
        }

        async function getMarket() {
            const res = await fetch('https://api.binance.com/api/v3/ticker/24hr');
            const data = await res.json();
            let html = '<h3>Piyasa Özeti</h3>';
            data.slice(0,10).forEach(c => {
                const ch = parseFloat(c.priceChangePercent);
                html += `<div>${c.symbol} <span style="color:${ch>=0?'lime':'red'}">${ch.toFixed(2)}%</span></div>`;
            });
            document.getElementById('result').innerHTML = html;
        }
    </script>
</body>
</html>
