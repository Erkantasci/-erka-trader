<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erka Trader Pro</title>
    <style>
        body { background: linear-gradient(135deg, #0a0a0a, #1a1a2e); color: #00ff9f; font-family: Arial; padding: 20px; margin: 0; }
        button { padding: 15px 30px; font-size: 18px; background: #00ff9f; color: #000; border: none; border-radius: 12px; margin: 10px; }
        input { padding: 15px; font-size: 18px; margin: 10px; width: 240px; border-radius: 8px; border: 2px solid #00ff9f; background: #1a1a2e; color: #00ff9f; }
        .result { margin-top: 30px; padding: 20px; background: rgba(26,26,46,0.9); border-radius: 12px; text-align: left; max-height: 600px; overflow-y: auto; }
        .big-change { font-weight: bold; animation: flash 1s; }
        @keyframes flash { 0% { background: yellow; } 100% { background: transparent; } }
    </style>
</head>
<body>
    <h1>🚀 Erka Trader Pro - Ani Değişimler</h1>
    <input type="password" id="pass" placeholder="Şifre gir">
    <button onclick="checkPass()">Giriş</button>

    <div id="content" style="display:none;">
        <button onclick="getAllCoins()">Tüm Coinler (Ani Değişimler Vurgulu)</button>
        <div id="result" class="result"></div>
    </div>

    <script>
        function checkPass() {
            if (document.getElementById('pass').value === "Serkan.456154") {
                document.getElementById('content').style.display = 'block';
                getAllCoins();
            } else {
                alert("Yanlış şifre!");
            }
        }
        function getAllCoins() {
            fetch('https://api.binance.com/api/v3/ticker/24hr')
                .then(r => r.json())
                .then(data => {
                    let html = '<h3>Tüm Coinler - Ani Değişimler Vurgulu</h3>';
                    data.sort((a,b) => Math.abs(b.priceChangePercent) - Math.abs(a.priceChangePercent)).slice(0,50).forEach(c => {
                        let ch = parseFloat(c.priceChangePercent);
                        let cls = Math.abs(ch) > 5 ? 'big-change' : '';
                        html += `<div class="${cls}" style="padding:8px 0;border-bottom:1px solid #333;">${c.symbol} <span style="color:${ch>=0?'lime':'red'}">${ch.toFixed(2)}%</span></div>`;
                    });
                    document.getElementById('result').innerHTML = html;
                });
        }
    </script>
</body>
</html>
