<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erka Trader Pro</title>
    <style>
        body { 
            background: #0f172a; 
            color: #e0f2fe; 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
        }
        .header { 
            background: #1e2937; 
            padding: 20px 30px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .logo { font-size: 26px; font-weight: bold; color: #22c55e; }
        .balance-box { 
            background: #334155; 
            padding: 12px 25px; 
            border-radius: 12px; 
            font-size: 20px; 
        }
        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; }
        .section { 
            background: #1e2937; 
            padding: 30px; 
            border-radius: 16px; 
            margin-bottom: 25px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
        }
        button { 
            padding: 14px 28px; 
            font-size: 17px; 
            background: #22c55e; 
            color: #0f172a; 
            border: none; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            margin: 8px 5px; 
        }
        input { 
            padding: 14px; 
            font-size: 17px; 
            border-radius: 10px; 
            border: 2px solid #475569; 
            background: #0f172a; 
            color: #e0f2fe; 
            width: 300px; 
            margin: 8px; 
        }
        .password-container {
            position: relative;
            display: inline-block;
        }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #64748b;
            font-size: 20px;
        }
        .result-box { 
            background: #0f172a; 
            padding: 20px; 
            border-radius: 12px; 
            margin-top: 20px; 
            min-height: 150px; 
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 14px; text-align: left; border-bottom: 1px solid #475569; }
        th { background: #334155; }
        .green { color: #22c55e; font-weight: bold; }
        .red { color: #ef4444; font-weight: bold; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">🚀 Erka Trader Pro</div>
    <div class="balance-box">
        Bakiye: <span id="balance">1000.00</span> USDT
    </div>
</div>

<div class="container">

    <!-- GİRİŞ EKRANI -->
    <div id="loginSection" class="section">
        <h2>Giriş Yap</h2>
        <div class="password-container">
            <input type="password" id="passwordInput" placeholder="Şifrenizi girin" 
                   onkeypress="if (event.key === 'Enter') login()">
            <span class="toggle-password" onclick="togglePassword()">👁️</span>
        </div>
        <br>
        <button onclick="login()">Giriş Yap</button>
    </div>

    <!-- ANA PANEL -->
    <div id="dashboard" style="display:none;">

        <div class="tabs" style="margin-bottom: 20px;">
            <button onclick="showSection('market')">Piyasa</button>
            <button onclick="showSection('portfolio')">Portföy</button>
            <button onclick="showSection('trade')">Al-Sat</button>
            <button onclick="showSection('history')">Geçmiş</button
