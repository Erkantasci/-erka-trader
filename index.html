<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Erka Trader Pro</title>
    <style>
        body { background: linear-gradient(135deg, #0a0a0a, #1a1a2e); color: #00ff9f; font-family: 'Segoe UI', Arial; padding: 20px; margin: 0; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #00ff9f; text-shadow: 0 0 10px #00ff9f; }
        button { padding: 15px 30px; font-size: 18px; background: linear-gradient(#00ff9f, #00cc7a); color: #000; border: none; border-radius: 12px; margin: 10px; cursor: pointer; box-shadow: 0 4px 15px rgba(0,255,159,0.3); }
        input { padding: 15px; font-size: 18px; margin: 10px; width: 240px; border-radius: 8px; border: 2px solid #00ff9f; background: #1a1a2e; color: #00ff9f; }
        .result { margin-top: 30px; padding: 20px; background: rgba(26,26,46,0.9); border-radius: 12px; text-align: left; box-shadow: 0 4px 20px rgba(0,255,159,0.2); }
        .card { background: rgba(26,26,46,0.8); padding: 20px; border-radius: 12px; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 Erka Trader Pro</h1>
        <div class="card">
            <input type="password" id="pass" placeholder="Şifre gir">
            <button onclick="checkPass()">Giriş</button>
        </div>

        <div id="content" style="display:none;">
            <div class="card">
                <h2>Hoş geldin Erkan</h2>
                <button onclick="getBTC()">BTC Fiyatı</button>
                <button onclick="getAllCoins()">Tüm Coinler</button>
            </div>
            <div id="result" class="result"></div>
        </div>
    </div>

    <script>
        function checkPass() {
            if (document.getElementById('pass').value === "Serkan.456154") {
                document.getElementById('content').style.display = 'block';
                getAllCoins();
            } else {
                alert("Yanlış şifre!");
            }
        }
        function getBTC() {
            fetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT')
                .then(r => r.json())
                .then(d => document.getElementById('result').innerHTML = '<h3>BTC: $' + parseFloat(d.price).toLocaleString() + '</h3>');
        }
        function getAllCoins() {
            fetch('https://api.binance.com/api/v3/ticker/24hr')
                .then(r => r.json())
                .then(data => {
                    let html = '<h3>Tüm Coinler (24s Değişim)</h3>';
                    data.sort((a,b) => Math.abs(b.priceChangePercent) - Math.abs(a.priceChangePercent)).slice(0,50).forEach(c => {
                        let ch = parseFloat(c.priceChangePercent);
                        html += `<div style="padding:8px 0;border-bottom:1px solid #333;">${c.symbol} <span style="color:${ch>=0?'#0f0':'#f00'}">${ch.toFixed(2)}%</span></div>`;
                    });
                    document.getElementById('result').innerHTML = html;
                });
        }
    </script>
</body>
</html>
